  { ch:7, title:'Ch7 103年 電腦通信網路 非選擇題',
    questions:[
      { q:'第一題：請回答下列網路分割及子網路網路位址之相關問題：(一) 255.255.252.0 這個子網路遮罩最多可將 140.128.0.0 這個網路分割為幾個有效的子網路？每個子網路中最多可以有幾台主機？(二) 假設某台主機的 IP 位址為 192.160.8.134，子網路遮罩為 255.255.255.248，則該主機所在的子網路「網路位址」為何？',
        a:`<p><strong>(一) 子網路分割計算：</strong></p>
<p>題目 140.128.0.0 為 Class B 網路，子網路遮罩為 255.255.252.0，二進位表示為：11111111.11111111.<span style="color:var(--ac)">111111</span>00.00000000</p>
<p>子網路遮罩中連續的 1 的數量為 6 位（第三個 octet 中），可以分割的子網路數量 = 2⁶ = <strong>64 個子網路</strong></p>
<p>剩餘的 0 位數量為 10 位，因此每個子網路中最多可以有 2¹⁰ - 2 = <strong>1022 台主機</strong>（減去網路地址和廣播地址）。</p>
<p><strong>(二) 網路位址計算：</strong></p>
<p>主機 IP 192.160.8.134 進行 AND 運算：</p>
<p>11000000.10100000.00001000.10000110 (192.160.8.134)</p>
<p>AND</p>
<p>11111111.11111111.11111111.11111000 (255.255.255.248)</p>
<p>= 11000000.10100000.00001000.10000000</p>
<p>因此，該主機所在的子網路網路位址為 <strong>192.160.8.128</strong></p>` },
      { q:'第二題：請回答下列與傳輸相關之問題：(一) 請說明何謂平行傳輸(parallel transmission)？何謂序列傳輸(serial transmission)？(二) 請說明何謂基頻傳輸(baseband)？何謂寬頻傳輸(broadband)？',
        a:`<p><strong>(一) 平行傳輸與序列傳輸：</strong></p>
<p><strong>平行傳輸（Parallel Transmission）</strong>是一種資料傳輸的方式，其中多個位元或資料同時透過多條平行的通道傳送。每個位元在不同的通道上傳送，可以同時傳送多個位元，並且在接收端同步重新組合以還原原始資料。平行傳輸通常使用多條導線或電纜，每條導線對應著一個位元，並且在相同的時刻傳輸。</p>
<p><strong>序列傳輸（Serial Transmission）</strong>則是另一種資料傳輸的方式，其中位元或資料依序透過單一的通道傳送。在序列傳輸中，位元按照順序逐個傳送，一次只傳輸一個位元。序列傳輸通常使用單條導線或通道，資料被轉換為連續的位元流進行傳輸。</p>
<p><strong>主要區別：</strong>平行傳輸可以同時傳輸多個位元，傳輸速率相對較高，但需要較多的導線；序列傳輸則一次只傳輸一個位元，需要較少的導線，但傳輸速率相對較低。</p>
<p><strong>(二) 基頻傳輸與寬頻傳輸：</strong></p>
<p><strong>基頻傳輸（Baseband）</strong>是一種數位訊號的傳輸方式，它將原始的數位訊號直接傳送在通訊媒介上，不經過調變或頻率轉換。在基頻傳輸中，訊號的頻帶範圍與原始訊號的頻率相同，通常是低頻範圍。基頻傳輸適用於短距離傳輸，例如在計算機網路中的乙太網路中使用。</p>
<p><strong>寬頻傳輸（Broadband）</strong>則是一種將數位或類比訊號進行調變，將其轉換成高頻信號進行傳輸的方式。在寬頻傳輸中，原始訊號的頻率被映射到較高的頻帶，以利於在傳輸過程中提供更高的傳輸速率和多路復用的能力。寬頻傳輸常用於長距離通訊，例如有線電視、光纖通訊和衛星通訊等。</p>` },
    ]
  },
  { ch:8, title:'Ch8 103年 行動網路系統 非選擇題',
    questions:[
      { q:'第一題：請列舉四項在 LTE-Advanced 規範中可以達到頻寬擴展、擴展網路覆蓋範圍、改善用戶(UE)間信號干擾以及提高峰值頻譜效率的關鍵技術，並分別簡述每項技術產生之效益。',
        a:`<p><strong>LTE-Advanced 四項關鍵技術及其效益：</strong></p>
<ol>
<li><strong>載波聚合（Carrier Aggregation）：</strong>載波聚合技術允許同一時間使用多個頻段進行數據傳輸，從而擴展了可用的頻寬。這種技術能夠提高傳輸速率和峰值頻譜效率，同時還可以提供更好的網路覆蓋範圍和連接可靠性。</li>
<li><strong>中繼器（Relay）：</strong>中繼器是一種用於擴展網路覆蓋範圍的裝置，它能夠接收和轉發來自基站和用戶設備的信號。中繼器部署在現有基站範圍之外，可以有效地擴展網路覆蓋範圍，並改善邊緣區域的訊號強度和質量。</li>
<li><strong>互動式多點傳輸和接收（CoMP, Coordinated Multi-Point Transmission and Reception）：</strong>CoMP 技術可以減少用戶設備之間的干擾，提高系統容量和覆蓋範圍。通過協調不同基站之間的信號傳輸和接收，CoMP 技術可以確保用戶在邊緣區域和高干擾環境中獲得更好的服務質量。</li>
<li><strong>軟頻率重用（Soft Frequency Reuse）：</strong>軟頻率重用技術根據用戶設備的位置和信號強度，動態地調整頻率重用模式。這種技術可以減少用戶之間的干擾，提高系統的容量和效能。通過靈活地分配頻譜資源，軟頻率重用技術可以提供更好的服務質量和網路性能。</li>
</ol>` },
      { q:'第二題：請列舉五項 LTE 行動通訊優於 3G 行動通訊的特質。',
        a:`<p><strong>LTE 優於 3G 的五項特質：</strong></p>
<ol>
<li><strong>更高的傳輸速率：</strong>LTE 提供了更高的傳輸速率，可以實現更快的下載和上傳速度。這使得用戶可以更快地瀏覽網頁、觀看串流視頻、下載大型文件等。</li>
<li><strong>低延遲：</strong>LTE 具有較低的網路延遲，這意味著數據傳輸的響應時間更短。這對於即時通訊、在線遊戲、視頻通話等延遲敏感的應用非常重要，提供更好的用戶體驗。</li>
<li><strong>更好的頻譜效率：</strong>LTE 使用了先進的多址接入技術，如 OFDMA（正交頻分多址）和 SC-FDMA（單載波頻分多址），以提供更高的頻譜效率。這意味著 LTE 能夠在相同的頻譜資源下傳輸更多的數據，支援更多的用戶連接。</li>
<li><strong>較好的覆蓋範圍：</strong>LTE 的基站配置和天線技術改善了覆蓋範圍，使得用戶在更遠的距離和邊緣區域也可以獲得較好的信號質量和連接穩定性。</li>
<li><strong>更高的容量：</strong>由於 LTE 具有更高的頻譜效率和更好的連接管理能力，它可以支援更多同時連接的用戶，提供更大的系統容量。這對於密集人口地區和高流量的環境非常重要，確保網路的穩定性和服務質量。</li>
</ol>` },
    ]
  },
];

// ══════════════════════════════════════════════════════════════
//  STORAGE
// ══════════════════════════════════════════════════════════════
const SK = 'quiz_net_v3';
function load(){try{const r=localStorage.getItem(SK);return r?JSON.parse(r):{hist:[],wrong:{},stats:{ans:0,ok:0}}}catch{return{hist:[],wrong:{},stats:{ans:0,ok:0}}}}
function save(d){try{localStorage.setItem(SK,JSON.stringify(d))}catch{}}
let store=load();

// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
let state={quiz:[],idx:0,answers:{},mode:'all',modeName:'',sOk:0,sTotal:0};

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
function init(){renderChapters();updateHdr();updateStats()}

function updateHdr(){
  const acc=store.stats.ans>0?Math.round(store.stats.ok/store.stats.ans*100)+'%':'—';
  document.getElementById('hdr-ans').textContent=store.stats.ans;
  document.getElementById('hdr-acc').textContent=acc;
}
function updateStats(){
  const acc=store.stats.ans>0?Math.round(store.stats.ok/store.stats.ans*100)+'%':'—';
  document.getElementById('s-total').textContent=store.stats.ans;
  document.getElementById('s-correct').textContent=store.stats.ok;
  document.getElementById('s-acc').textContent=acc;
}
function renderChapters(){
  document.getElementById('ch-grid').innerHTML=CHAPTERS.map(ch=>{
    const qs=QB.filter(q=>q.ch===ch.id);
    const done=qs.filter(q=>store.stats['q_'+q.id]).length;
    const pct=qs.length?Math.round(done/qs.length*100):0;
    const wc=qs.filter(q=>store.wrong[q.id]).length;
    return`<div class="ch-card" onclick="startQuiz(${ch.id})">
      <div class="ch-num">Chapter ${ch.id} · ${ch.year} 年</div>
      <div class="ch-title">${ch.title}${wc>0?`<span class="err-badge">${wc} 錯題</span>`:''}</div>
      <div class="ch-meta"><span>${qs.length} 題</span><span>已完成 ${done}</span></div>
      <div class="ch-bar"><div class="ch-bar-fill" style="width:${pct}%"></div></div>
    </div>`}).join('');
}

// ══════════════════════════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════════════════════════
function tab(t){
  ['mcq','essay','history','mistakes'].forEach((x,i)=>{
    document.getElementById('t-'+x).style.display=x===t?'':'none';
    document.querySelectorAll('.nav-tab')[i].classList.toggle('active',x===t);
  });
  if(t==='essay') renderEssay();
  if(t==='history') renderHistory();
  if(t==='mistakes') renderMistakes();
}
function renderEssay(){
  document.getElementById('essay-content').innerHTML=ESSAYS.map(e=>`
    <h3 style="font-size:14px;color:var(--ac);margin:20px 0 12px;font-family:'JetBrains Mono',monospace;letter-spacing:1px">${e.title}</h3>
    ${e.questions.map((q,i)=>`
    <div class="essay-card">
      <div class="essay-q"><strong>題目：</strong>${q.q}</div>
      <div class="ans-title">參考答案</div>
      <div class="essay-ans">${q.a}</div>
    </div>`).join('')}`).join('');
}
function renderHistory(){
  const el=document.getElementById('hist-list');
  if(!store.hist.length){el.innerHTML='<div class="empty">尚無練習紀錄</div>';return;}
  el.innerHTML=[...store.hist].reverse().slice(0,20).map(h=>{
    const p=Math.round(h.ok/h.tot*100);
    const c=p>=80?'var(--gr)':p>=60?'var(--yw)':'var(--rd)';
    return`<div class="hist-item">
      <div class="hist-pct" style="color:${c}">${p}%</div>
      <div class="hist-info">
        <div class="hist-title">${h.modeName} — ${h.ok}/${h.tot} 題正確</div>
        <div class="hist-date">${new Date(h.time).toLocaleString('zh-TW')}</div>
      </div></div>`}).join('');
}
function renderMistakes(){
  const wqs=QB.filter(q=>store.wrong[q.id]);
  const el=document.getElementById('mistakes-content');
  if(!wqs.length){el.innerHTML='<div class="empty">🎉 目前沒有錯題！</div>';return;}
  el.innerHTML=`<div style="margin-bottom:14px;color:var(--tm);font-size:13px">共 ${wqs.length} 道錯題</div>
    <button class="btn-all" onclick="startMistakeQuiz()">📚 開始錯題複習（${wqs.length} 題）</button>`;
}

// ══════════════════════════════════════════════════════════════
//  QUIZ
// ══════════════════════════════════════════════════════════════
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

function startQuiz(chOrAll){
  let qs,lbl;
  if(chOrAll==='all'){qs=shuffle(QB);lbl='全部題目隨機';document.getElementById('q-ch-lbl').textContent='ALL CHAPTERS';document.getElementById('q-sub').textContent='共'+QB.length+'題隨機排列';}
  else{
    qs=shuffle(QB.filter(q=>q.ch===chOrAll));
    const ch=CHAPTERS.find(c=>c.id===chOrAll);
    lbl=`Ch${chOrAll} ${ch.year}年 ${ch.title}`;
    document.getElementById('q-ch-lbl').textContent=`CHAPTER ${chOrAll} · ${ch.year} 年`;
    document.getElementById('q-sub').textContent=ch.title;
  }
  state={quiz:qs,idx:0,answers:{},mode:chOrAll,modeName:lbl,sOk:0,sTotal:0};
  showPage('pg-quiz');renderQ();
}
function startMistakeQuiz(){
  const qs=shuffle(QB.filter(q=>store.wrong[q.id]));
  if(!qs.length)return;
  state={quiz:qs,idx:0,answers:{},mode:'mistakes',modeName:'錯題複習',sOk:0,sTotal:0};
  document.getElementById('q-ch-lbl').textContent='MISTAKE REVIEW';
  document.getElementById('q-sub').textContent='錯題複習 — '+qs.length+' 題';
  showPage('pg-quiz');renderQ();
}

function renderQ(){
  const q=state.quiz[state.idx],tot=state.quiz.length,idx=state.idx;
  document.getElementById('prog-txt').textContent=`第 ${idx+1} / ${tot} 題`;
  document.getElementById('prog-sc').textContent=`本次：${state.sOk} 正確`;
  document.getElementById('prog-fill').style.width=`${idx/tot*100}%`;
  const keys=['A','B','C','D'];
  document.getElementById('q-content').innerHTML=`<div class="q-card">
    <div class="q-no">Q${idx+1} · Chapter ${q.ch} · ${CHAPTERS.find(c=>c.id===q.ch).year} 年</div>
    <div class="q-txt">${q.text}</div>
    <div class="opts" id="opts">${q.opts.map((o,i)=>`
      <div class="opt" id="o${i}" onclick="pick(${i})">
        <span class="opt-k">${keys[i]}</span><span>${o.replace(/^[ABCD]\.\s*/,'')}</span>
      </div>`).join('')}</div>
    <div class="exp" id="exp"><strong>解析：</strong>${q.exp}</div>
  </div>`;
  document.getElementById('btn-next').disabled=true;
  document.getElementById('btn-hint').style.display='';
  document.getElementById('btn-skip').disabled=false;
}

function pick(i){
  const q=state.quiz[state.idx];
  if(state.answers[state.idx]!==undefined)return;
  state.answers[state.idx]=i;
  const ok=i===q.ans;
  state.sTotal++;if(ok)state.sOk++;
  store.stats.ans++;if(ok)store.stats.ok++;
  store.stats['q_'+q.id]=true;
  if(!ok)store.wrong[q.id]=(store.wrong[q.id]||0)+1;
  else delete store.wrong[q.id];
  save(store);updateHdr();
  for(let j=0;j<4;j++){
    const el=document.getElementById('o'+j);
    if(!el)continue;
    el.classList.add('dis');
    if(j===q.ans)el.classList.add('ok');
    else if(j===i&&!ok)el.classList.add('ng');
  }
  document.getElementById('exp').classList.add('show');
  document.getElementById('btn-next').disabled=false;
  document.getElementById('btn-skip').disabled=true;
  document.getElementById('prog-sc').textContent=`本次：${state.sOk} 正確`;
}
function showHint(){document.getElementById('exp')?.classList.add('show');}
function skipQ(){
  if(state.answers[state.idx]!==undefined)return;
  state.idx++;
  if(state.idx>=state.quiz.length)finish();
  else renderQ();
}
function clearAllRecords(){
  if(!confirm('確定要清除所有練習紀錄嗎？此操作無法復原。'))return;
  store={hist:[],wrong:{},stats:{ans:0,ok:0}};
  save(store);updateHdr();updateStats();renderChapters();
  alert('已清除所有紀錄。');
}
function nextQ(){
  state.idx++;
  if(state.idx>=state.quiz.length)finish();
  else renderQ();
}
function finish(){
  const tot=state.quiz.length,ok=state.sOk,pct=Math.round(ok/tot*100);
  store.hist.push({time:Date.now(),mode:state.mode,modeName:state.modeName,ok,tot,pct});
  if(store.hist.length>50)store.hist=store.hist.slice(-50);
  save(store);updateStats();renderChapters();
  document.getElementById('r-score').textContent=pct+'%';
  document.getElementById('r-lbl').textContent=pct===100?'🎉 全部答對！':pct>=80?'✅ 表現優秀！':pct>=60?'📖 繼續加油！':'💪 還需多練習！';
  document.getElementById('r-ok').textContent=ok;
  document.getElementById('r-ng').textContent=tot-ok;
  document.getElementById('r-tot').textContent=tot;
  showPage('pg-result');
}
function retryQuiz(){startQuiz(state.mode);}
function goHome(){showPage('pg-home');updateStats();renderChapters();}
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}

init();
</script>
</body>
