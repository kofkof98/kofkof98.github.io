<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中華電信招考 精選題庫</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --danger: #f85149;
    --warning: #e3b341;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  header h1 {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .stats-bar {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.82rem;
    color: var(--text-muted);
  }

  .stat-item { display: flex; align-items: center; gap: 5px; }
  .stat-num { font-family: 'JetBrains Mono', monospace; font-weight: 500; }
  .stat-correct { color: var(--accent2); }
  .stat-wrong { color: var(--danger); }

  .btn-clear {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .btn-clear:hover { border-color: var(--danger); color: var(--danger); }

  .unit-nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .unit-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    font-family: 'Noto Sans TC', sans-serif;
    position: relative;
  }

  .unit-btn:hover { border-color: var(--accent); color: var(--accent); }
  .unit-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  .unit-btn .unit-prog {
    font-size: 0.68rem;
    opacity: 0.75;
    margin-left: 3px;
  }

  .unit-btn.unavailable {
    opacity: 0.35;
    cursor: not-allowed;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 16px;
  }

  .quiz-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 32px;
    width: 100%;
    max-width: 720px;
  }

  .q-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    font-size: 0.8rem;
    color: var(--text-dim);
  }

  .q-counter { font-family: 'JetBrains Mono', monospace; }
  .q-unit { color: var(--accent); font-size: 0.78rem; }

  .q-progress {
    height: 3px;
    background: var(--surface2);
    border-radius: 3px;
    margin-bottom: 22px;
    overflow: hidden;
  }

  .q-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #a5d6ff);
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .q-text {
    font-size: 1.05rem;
    line-height: 1.75;
    margin-bottom: 24px;
    font-weight: 500;
    color: var(--text);
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 22px;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.18s;
    user-select: none;
  }

  .option:hover:not(.disabled) {
    border-color: var(--accent);
    background: rgba(88, 166, 255, 0.06);
  }

  .option.selected { border-color: var(--accent); background: rgba(88, 166, 255, 0.1); }
  .option.correct { border-color: var(--accent2); background: rgba(63, 185, 80, 0.12); }
  .option.wrong { border-color: var(--danger); background: rgba(248, 81, 73, 0.1); }
  .option.correct-highlight { border-color: var(--accent2); background: rgba(63, 185, 80, 0.06); }
  .option.disabled { cursor: default; }

  .opt-label {
    min-width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.78rem;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.18s;
  }

  .option.correct .opt-label { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .option.wrong .opt-label { background: var(--danger); border-color: var(--danger); color: #fff; }
  .option.correct-highlight .opt-label { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .option.selected .opt-label { background: var(--accent); border-color: var(--accent); color: #fff; }

  .opt-text { font-size: 0.93rem; line-height: 1.6; padding-top: 2px; }

  .explanation {
    background: var(--surface2);
    border-left: 3px solid var(--accent2);
    border-radius: 0 8px 8px 0;
    padding: 14px 16px;
    font-size: 0.87rem;
    line-height: 1.7;
    color: var(--text-muted);
    margin-bottom: 22px;
    display: none;
  }

  .explanation.show { display: block; animation: fadeIn 0.25s ease; }
  .explanation strong { color: var(--text); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

  .controls {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn {
    padding: 9px 22px;
    border-radius: 8px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    font-family: 'Noto Sans TC', sans-serif;
  }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #79b8ff; }
  .btn-secondary { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .result-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
    margin-bottom: 14px;
  }

  .result-badge.correct-badge { background: rgba(63,185,80,0.15); color: var(--accent2); border: 1px solid rgba(63,185,80,0.3); }
  .result-badge.wrong-badge { background: rgba(248,81,73,0.12); color: var(--danger); border: 1px solid rgba(248,81,73,0.25); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state h2 { font-size: 1.1rem; margin-bottom: 8px; }
  .empty-state p { font-size: 0.88rem; }

  .complete-state {
    text-align: center;
    padding: 40px 20px;
  }
  .complete-state h2 { font-size: 1.4rem; margin-bottom: 12px; color: var(--accent); }
  .complete-score { font-size: 2.5rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; margin: 16px 0; }
  .score-good { color: var(--accent2); }
  .score-mid { color: var(--warning); }
  .score-bad { color: var(--danger); }

  .complete-state .btn-restart {
    background: var(--accent); color: #fff; padding: 11px 32px;
    border-radius: 8px; border: none; font-size: 0.95rem;
    font-weight: 600; cursor: pointer; margin-top: 16px;
    font-family: 'Noto Sans TC', sans-serif;
    transition: background 0.2s;
  }
  .complete-state .btn-restart:hover { background: #79b8ff; }

  @media (max-width: 600px) {
    .quiz-card { padding: 20px 16px; }
    header h1 { font-size: 0.95rem; }
    .stats-bar { font-size: 0.76rem; gap: 8px; }
  }
</style>
</head>
<body>

<header>
  <h1>📚 中華電信招考 精選題庫</h1>
  <div class="stats-bar">
    <div class="stat-item"><span class="stat-num stat-correct" id="stat-correct">0</span> 正確</div>
    <div class="stat-item"><span class="stat-num stat-wrong" id="stat-wrong">0</span> 錯誤</div>
    <div class="stat-item">正確率 <span class="stat-num" id="stat-rate">-</span></div>
    <button class="btn-clear" onclick="clearRecords()">🗑 清除紀錄</button>
  </div>
</header>

<div class="unit-nav" id="unit-nav"></div>

<main>
  <div class="quiz-card" id="quiz-card">
    <div class="empty-state">
      <h2>請選擇上方的單元開始作答</h2>
      <p>共有 10 個學習單元可作答（SDN 題目已整合至計算機概論）</p>
    </div>
  </div>
</main>

<script>
// ============================================================
//  題目資料庫
// ============================================================
const UNITS = [
  {
    id: 'ai',
    name: 'AI、機械學習、深度學習',
    available: true,
    questions: [
      { q:'AI最初的概念是什麼？', opts:['計算機科學','資訊科學','機器智慧','人工智慧'], ans:3, exp:'AI最初的概念即為人工智慧，是指讓機器模仿人類智慧和思考方式的技術和方法。' },
      { q:'機器學習是一種什麼樣的技術？', opts:['一種人工智慧技術','一種大數據技術','一種軟體開發技術','一種硬體設計技術'], ans:0, exp:'機器學習是人工智慧的一個分支，是通過讓機器自主學習來實現人工智慧的技術。' },
      { q:'深度學習是一種什麼樣的技術？', opts:['一種人工智慧技術','一種大數據技術','一種軟體開發技術','一種硬體設計技術'], ans:0, exp:'深度學習是人工智慧的一個分支，是基於神經網路的機器學習方法，通過多層次的神經網路實現對複雜問題的學習和預測。' },
      { q:'機器學習的類型包括哪些？', opts:['半監督學習、非監督學習和強化學習','監督學習、半監督學習和強化學習','監督學習、非監督學習和強化學習','監督學習、非監督學習、半監督學習和強化學習'], ans:3, exp:'機器學習的類型分別為監督學習、非監督學習、半監督學習和強化學習。' },
      { q:'非監督學習中的目標是什麼？', opts:['預測輸出值','識別類別標籤','發現數據中的模式和結構','給出正確的答案'], ans:2, exp:'非監督學習的目標是從數據中發現模式和結構，而不是進行輸出預測或標籤識別。' },
      { q:'強化學習中的「環境」指的是什麼？', opts:['數據集','模型參數','學習目標','與智慧體交互的外部世界'], ans:3, exp:'強化學習中的「環境」指與智慧體進行交互的外部世界，包括智慧體能夠感知的一切事物和事件。' },
      { q:'人工神經網路中的「神經元」指的是什麼？', opts:['網路層次結構','網路設計參數','神經元之間的連接','神經元的計算單元'], ans:3, exp:'人工神經網路中的「神經元」是神經網路中的計算單元，能夠對輸入進行計算，並將計算結果傳遞給下一層的神經元。' },
      { q:'梯度下降是什麼？', opts:['一種神經網路的構建方法','一種機器學習算法','一種深度學習框架','一種通訊網路的框架'], ans:1, exp:'梯度下降是一種優化算法，用於調整機器學習模型的參數以最小化成本函數或損失函數。' },
      { q:'下列何者不是人工智慧的分支？', opts:['機器學習','深度學習','大數據','自然語言處理'], ans:2, exp:'大數據並不是人工智慧的分支，但它是人工智慧技術發展的重要支撐，因為它提供了足夠的數據量，讓機器學習和深度學習的效果更加顯著。' },
      { q:'深度學習中，什麼是卷積神經網路？', opts:['一種神經網路架構','一種優化算法','一種遺傳算法','一種激勵函數'], ans:0, exp:'卷積神經網路（CNN）是一種深度學習的神經網路架構，主要用於處理圖像和影片等數據。' },
      { q:'下列哪種學習方式是無監督學習？', opts:['分類（Clustering）','回歸（Regression）','強化學習（Reinforcement）','監督分類'], ans:0, exp:'分類（聚類）是一種無監督學習方式，它不需要事先標記數據類別，而是通過對數據的相似性進行分類。' },
    ]
  },
  {
    id: 'wifi6',
    name: 'Wi-Fi 6',
    available: true,
    questions: [
      { q:'以下哪種頻段不是 Wi-Fi 6 支持的頻段？', opts:['2.4 GHz','5 GHz','2.4 及 5 GHz','60 GHz'], ans:3, exp:'Wi-Fi 6 支持的頻段包括 2.4 GHz、5 GHz 和 6 GHz（Wi-Fi 6e）等頻段，但不支持 60 GHz 的毫米波頻段。' },
      { q:'Wi-Fi 6 中的 OFDMA 是什麼意思？', opts:['單載波分頻多址','正交分頻多路徑傳輸','正交分頻多址','正交分頻多工'], ans:2, exp:'OFDMA 是 Orthogonal Frequency Division Multiple Access 的縮寫，意思是正交分頻多址，是 Wi-Fi 6 中一種用於提高頻譜效率和傳輸效率的技術。' },
      { q:'Wi-Fi 6 中的 MU-MIMO 是什麼意思？', opts:['多載波分頻多址','多點存取','多用戶多輸入多輸出','多點分發服務'], ans:2, exp:'MU-MIMO 是 Multi-User Multiple Input Multiple Output 的縮寫，意思是多用戶多輸入多輸出，是 Wi-Fi 6 中一種用於提高網路容量和傳輸效率的技術。' },
      { q:'以下哪種技術不是 Wi-Fi 6 中用於提高速率和容量的技術？', opts:['1024-QAM','BSS Coloring','Beamforming','MIMO'], ans:1, exp:'BSS Coloring 是一種用於減少干擾和提高效率的技術，不是用於提高速率和容量的技術。Wi-Fi 6 中用於提高速率和容量的技術主要包括 1024-QAM、Beamforming 和 MIMO 等。' },
      { q:'以下哪種技術不是 Wi-Fi 6 中用於提高安全性的技術？', opts:['WPA3','OWE','Enhanced Open','WPA2'], ans:3, exp:'WPA2 是一種舊的 Wi-Fi 安全標準，不是 Wi-Fi 6 中用於提高安全性的技術。Wi-Fi 6 中用於提高安全性的技術主要包括 WPA3、OWE 和 Enhanced Open 等。' },
      { q:'Wi-Fi 6 中的 TPC 是什麼意思？', opts:['發射功率控制','通道選擇','動態頻道選擇','頻寬控制'], ans:0, exp:'TPC 是 Transmit Power Control 的縮寫，意思是發射功率控制，是 Wi-Fi 6 中用於減少干擾和提高效率的技術。' },
      { q:'Wi-Fi 6 中的 TWT 是什麼意思？', opts:['通訊等待時間','目標喚醒時間','傳輸等待時間','無線傳輸時間'], ans:1, exp:'TWT 代表 "Target Wake Time"，即「目標喚醒時間」。這是 Wi-Fi 6 中的一項新功能，旨在提高無線設備的效能和節省能源。' },
      { q:'Wi-Fi 6 中的 AX 是什麼意思？', opts:['802.11Ax 標準','高速無線存取技術','無線網路加速器','5G 技術'], ans:0, exp:'AX 是 802.11Ax 標準的簡稱，是 Wi-Fi 6 的技術標準。' },
      { q:'Wi-Fi 6 中的空時區塊編碼（STBC）是什麼意思？', opts:['多載波分頻多址','多用戶通信技術','多點存取','空時分頻多工'], ans:3, exp:'STBC 是 Space Time Block Coding 的縮寫，意思是空時區塊編碼，是 Wi-Fi 6 中一種用於提高傳輸速率和可靠性的技術。' },
      { q:'Wi-Fi 6 中的 AP 是什麼意思？', opts:['無線網路加速器','無線存取點','路由器','調變解調器'], ans:1, exp:'AP 是 Access Point 的縮寫，意思是存取點，是 Wi-Fi 6 中用於建立無線網路的設備，可以提供用戶存取網路的服務。' },
    ]
  },
  {
    id: '5g',
    name: '5G',
    available: true,
    questions: [
      { q:'以下哪種頻譜不屬於 5G 使用的頻段？', opts:['2.4 GHz','28 GHz','39 GHz','60 GHz'], ans:0, exp:'2.4 GHz 是 4G 及以下行動通訊網路使用的頻段，5G 使用的頻段較高，主要包括 28 GHz、39 GHz 和 60 GHz。' },
      { q:'以下哪種技術不是 5G 中重要的技術之一？', opts:['MIMO','OFDM','CDMA','Massive MIMO'], ans:2, exp:'CDMA 是 3G 時代的一種技術，而 5G 中重要的技術主要包括 MIMO、OFDM 和 Massive MIMO 等。' },
      { q:'以下哪種技術不是 5G 中用於增加頻譜效率的技術？', opts:['Beamforming','Carrier Aggregation','MU-MIMO','CDMA'], ans:3, exp:'CDMA 不是用於增加頻譜效率的技術，而是用於實現多用戶之間的干擾消除。' },
      { q:'以下哪種技術不是 5G 中用於提高傳輸速率的技術？', opts:['Massive MIMO','Small Cell','Carrier Aggregation','Beamforming'], ans:1, exp:'Small Cell 則是一種基地台部署方式，它通常用於提高覆蓋面積，但不直接用於提高單個連接的傳輸速率。' },
      { q:'以下哪種技術不是 5G 中用於降低延遲的技術？', opts:['Edge Computing（邊緣運算）','URLLC','MEC（多存取邊緣計算）','Massive MIMO'], ans:3, exp:'Massive MIMO 不是用於降低延遲的技術，而是用於提高頻譜效率和增加網路容量。' },
      { q:'以下哪種頻段對於室內覆蓋更加重要？', opts:['28 GHz','39 GHz','60 GHz','2.4 GHz'], ans:3, exp:'2.4 GHz 對於室內覆蓋更加重要，因為它的穿透力較強，可以穿透建築物並提供更好的覆蓋。' },
      { q:'以下哪種技術不是 5G 中用於提高頻譜效率的技術？', opts:['Massive MIMO','Beamforming','Carrier Aggregation','以上皆是提高頻譜效率的技術'], ans:3, exp:'Massive MIMO、Beamforming、Carrier Aggregation 皆是提高頻譜效率的技術，所以答案 D「以上皆是」本身即為錯誤敘述。選 D 為正確答案（題目問哪個「不是」，選 D 表示 D 的敘述是錯的，因為三者都是）。' },
      { q:'以下哪種技術是 5G 中用於實現多重存取的技術？', opts:['FDMA','CDMA','TDMA','SDMA'], ans:3, exp:'SDMA（空間分割多址）是 5G 中用於實現多重存取的一種技術，通過使用不同的天線和波束成形技術，允許同一頻段上的不同用戶同時傳輸和接收數據。' },
      { q:'以下哪種技術不是 5G 中用於實現低延遲的技術？', opts:['Edge Computing','Network Slicing','Coordinated Multipoint','Massive MIMO'], ans:3, exp:'Massive MIMO 是一種用於提高頻譜效率的技術，不是用於實現低延遲的技術。5G 中用於實現低延遲的技術主要包括 Edge Computing、Network Slicing 和 Coordinated Multipoint 等。' },
      { q:'以下哪種技術不是 5G 中用於提高容量的技術？', opts:['mmWave','Carrier Aggregation','Virtualized RAN','MIMO'], ans:2, exp:'Virtualized RAN（虛擬化無線存取網路）主要是一種網路架構技術，用於提高網路管理的靈活性和效率，不直接用於增加容量。' },
      { q:'5G NR 通訊系統中，下列哪個技術使其能夠在頻譜效率和傳輸速率方面比 4G LTE 更優秀？', opts:['Massive MIMO','Beamforming','Network Slicing','Virtualized RAN'], ans:0, exp:'5G NR 使用了大規模多入多出（Massive MIMO）技術，這種技術利用了大量的天線和智能算法，能夠有效地提高系統的頻譜效率和傳輸速率。' },
      { q:'5G NR 通訊系統中，下列哪個特性使其能夠更好地支援大量設備和大量數據的傳輸？', opts:['Millimeter Wave (mmWave) Spectrum','Dual Connectivity','Network Slicing','Massive MIMO'], ans:2, exp:'5G NR 支援網路切片（Network Slicing）技術，能夠根據不同的應用場景和用戶需求，將整個網路切割成多個獨立的虛擬網路，以更好地支援大量設備和大量數據的傳輸。' },
      { q:'5G NR 使用的 MIMO 天線技術比 4G LTE 更高效的原因是什麼？', opts:['5G NR 使用更多的天線','5G NR 使用更高頻率的信號','5G NR 使用更高效的信號處理算法','以上都是'], ans:3, exp:'5G NR 使用大規模多入多出（Massive MIMO）技術，比 4G LTE 使用更多的天線，能夠更好地利用多路徑傳播，提高頻譜效率和傳輸速率。此外，5G NR 使用更高頻率的信號和更高效的信號處理算法。' },
      { q:'5G NR 通訊系統相較於 4G LTE，下列哪個敘述是錯誤的？', opts:['5G NR 支援更高的頻譜帶寬','5G NR 支援更低的通信延遲','5G NR 支援更高的最大下行傳輸速率','5G NR 支援更少的最大上行傳輸速率'], ans:3, exp:'5G NR 支援更高的最大上行傳輸速率，相較於 4G LTE 更有優勢。' },
      { q:'5G NR 中，下列哪個技術對提高系統容量和頻譜效率非常重要？', opts:['多輸入多輸出（MIMO）技術','射頻前端技術','虛擬化無線存取技術','軟體定義網路技術'], ans:0, exp:'5G NR 中，MIMO 技術是一種關鍵的技術，能夠提高系統的容量和頻譜效率。MIMO 技術基於多個天線和信道之間的空間多樣性，利用多路徑傳播的信號，提高了系統的可靠性和效率。' },
      { q:'以下哪種技術不是 5G 中用於實現高可靠低延遲通信（URLLC）的技術？', opts:['Network Slicing','Dynamic Spectrum Sharing','Time Sensitive Networking','Polar Coding'], ans:1, exp:'Dynamic Spectrum Sharing 是一種用於提高頻譜效率和網路容量的技術，不是用於實現 URLLC 的技術。5G 中用於實現 URLLC 的技術主要包括 Network Slicing、Time Sensitive Networking 和 Polar Coding 等。' },
      { q:'以下哪種技術不是 5G 中用於實現虛擬現實（VR）和擴增現實（AR）的技術？', opts:['Beamforming','Edge Computing','Multi-Access Edge Computing','Haptic Feedback'], ans:3, exp:'Haptic Feedback 通常與觸覺回饋設備和技術相關，不是 5G 通信技術的一部分。' },
    ]
  },

  {

    available: true,
    questions: [
      { q:'區塊鏈是什麼？', opts:['一種數位貨幣','一種去中心化的資料庫','一種加密技術','一種網際網路協議'], ans:1, exp:'區塊鏈是一種去中心化、公開、安全的資料庫，它可以讓多個參與者透過網路互相交換資料，而且不需要第三方機構進行驗證。在區塊鏈上，所有資料都被加密並存儲在分散的節點上，這些節點通過共識機制來確認交易的有效性。' },
      { q:'區塊鏈的主要應用場景是什麼？', opts:['金融交易','物聯網','社交媒體','雲端計算'], ans:0, exp:'區塊鏈最初應用於比特幣等加密貨幣的金融交易中，由於其去中心化、透明、不可篡改等特性，現在也被廣泛應用於金融業務的其他方面。' },
      { q:'區塊鏈的特點不包括以下哪個？', opts:['去中心化','可篡改','不可篡改','共識機制'], ans:1, exp:'區塊鏈的特點包括去中心化、不可篡改、共識機制等，其中最重要的特點之一就是不可篡改性，保證了區塊鏈上的資訊不會被篡改或刪除。' },
      { q:'以下哪個不是區塊鏈的基礎原理？', opts:['非對稱加密','共識機制','去中心化','交易手續費'], ans:3, exp:'區塊鏈的基礎原理包括非對稱加密（用於保護數據的安全性）、共識機制（用於確定數據的一致性）和去中心化（不依賴單一中心機構）。交易手續費通常是與加密貨幣（如比特幣）相關的概念，不是區塊鏈的基礎原理。' },
      { q:'在區塊鏈中，交易在被添加到區塊之前需要先經過什麼過程？', opts:['Hashing','Digital Signature','Mining','Verification'], ans:3, exp:'交易在被添加到區塊之前需要先經過驗證（Verification），驗證是確保交易的合法性和有效性，通常由節點或礦工進行。' },
      { q:'區塊鏈的主要特點是？', opts:['雲端計算','物聯網','資料安全和信任','機器學習'], ans:2, exp:'區塊鏈的主要目的是建立一個去中心化、不可竄改的資料庫，提供資料安全和信任的保障。' },
      { q:'區塊鏈的特點不包括以下哪個？', opts:['分散式','匿名性','去中心化','高速交易'], ans:3, exp:'區塊鏈的高安全性和可信度是建立在分散式、去中心化和匿名性等特點的基礎上，但區塊鏈技術並不支持高速交易。' },
      { q:'在區塊鏈技術中，以下哪個過程是不需要使用加密算法的？', opts:['挖礦','簽名','證明','共識'], ans:3, exp:'共識過程是區塊鏈系統中的重要機制之一，它通過各個節點之間的協作和協調，確定區塊鏈上的交易和記錄是否有效和一致。共識機制並不需要使用加密算法，但需要節點之間的通信和計算。' },

      { q:'下列何者不是雲端計算的服務模式？', opts:['IAAS','SAAS','PAAS','HAAS'], ans:3, exp:'雲端計算的服務模式有三種，分別是基礎架構即服務（IAAS）、平台即服務（PAAS）和軟體即服務（SAAS），而 HAAS 並不是雲端計算的服務模式，它是指硬體即服務。' },

      { q:'下列何者不是雲端計算的優勢？', opts:['提高資訊處理效能','提高資料傳輸速度','降低資訊技術維護成本','提高服務可用性和穩定性'], ans:1, exp:'雲端計算的優勢包括提高資訊處理效能、降低資訊技術維護成本、提高服務可用性和穩定性，但是並不是提高資料傳輸速度，這是取決於網路速度和資料量的大小。' },
      { q:'雲端計算的優點是什麼？', opts:['資料安全性高','速度較快','需要的設備較少','需要較少的網路頻寬'], ans:2, exp:'雲端計算可以讓使用者在不需擁有高規格電腦或其他設備的情況下，透過網路即可使用雲端服務。因此需要的設備較少是雲端計算的一大優點。' },
      { q:'關於雲端計算的定義，下列何者是錯誤的？', opts:['雲端計算可以提供不同的服務，如 IAAS、PAAS、SAAS 等','雲端計算是一種基於網路的運算模式','雲端計算是指在網路上提供可隨時隨地存取的共享資源','雲端計算只適用於商業用途，一般民眾無法使用'], ans:3, exp:'雲端計算適用於商業用途以及個人用途，一般民眾也可以使用雲端服務。' },

      { q:'下列哪種雲端服務模式最適合企業降低硬體設備的資本資出？', opts:['軟體即服務（SAAS）','平台即服務（PAAS）','基礎架構即服務（IAAS）','一般雲端存儲'], ans:2, exp:'基礎架構即服務（IAAS）是一種雲端服務模式，它提供了虛擬化的硬體基礎架構，包括虛擬機器、儲存和網路資源。企業可以使用這些虛擬化資源來運行應用程序，而不必購買和維護自己的物理硬體，有助於降低資本支出。' },

// ============================================================
//  State
// ============================================================
let state = {
  currentUnit: null,
  currentIndex: 0,
  answered: false,
  selectedOpt: null,
  records: {} // { unitId: { total, correct, answered: Set } }
};

// Load from localStorage
function loadRecords() {
  try {
    const raw = localStorage.getItem('cht_quiz_records');
    if (raw) {
      const parsed = JSON.parse(raw);
      // Convert answered arrays back to Sets
      for (const key in parsed) {
        if (parsed[key].answered) {
          parsed[key].answered = new Set(parsed[key].answered);
        }
      }
      state.records = parsed;
    }
  } catch(e) {}
}

function saveRecords() {
  try {
    const toSave = {};
    for (const key in state.records) {
      toSave[key] = {
        ...state.records[key],
        answered: [...(state.records[key].answered || [])]
      };
    }
    localStorage.setItem('cht_quiz_records', JSON.stringify(toSave));
  } catch(e) {}
}

function getRecord(unitId) {
  if (!state.records[unitId]) {
    state.records[unitId] = { total: 0, correct: 0, answered: new Set() };
  }
  return state.records[unitId];
}

function clearRecords() {
  if (!confirm('確定要清除所有作答紀錄嗎？')) return;
  state.records = {};
  saveRecords();
  renderUnitNav();
  updateStats();
  if (state.currentUnit) selectUnit(state.currentUnit.id);
}

// ============================================================
//  Stats
// ============================================================
function updateStats() {
  let totalCorrect = 0, totalWrong = 0;
  for (const key in state.records) {
    const r = state.records[key];
    totalCorrect += r.correct || 0;
    totalWrong += ((r.total || 0) - (r.correct || 0));
  }
  document.getElementById('stat-correct').textContent = totalCorrect;
  document.getElementById('stat-wrong').textContent = totalWrong;
  const total = totalCorrect + totalWrong;
  document.getElementById('stat-rate').textContent = total > 0
    ? Math.round(totalCorrect / total * 100) + '%' : '-';
}

// ============================================================
//  Unit Nav
// ============================================================
function renderUnitNav() {
  const nav = document.getElementById('unit-nav');
  nav.innerHTML = '';
  UNITS.forEach(unit => {
    const btn = document.createElement('button');
    btn.className = 'unit-btn' + (unit.available ? '' : ' unavailable');
    if (state.currentUnit && state.currentUnit.id === unit.id) btn.classList.add('active');

    const rec = state.records[unit.id];
    let progText = '';
    if (unit.available && rec && rec.total > 0) {
      progText = `<span class="unit-prog">${rec.correct}/${rec.total}</span>`;
    }

    btn.innerHTML = unit.name + progText;
    btn.title = unit.available ? unit.name : (unit.note ? unit.name + ' ' + unit.note : unit.name + '（資料未包含）');
    if (unit.available) btn.onclick = () => selectUnit(unit.id);
    nav.appendChild(btn);
  });
}

// ============================================================
//  Unit Selection
// ============================================================
function selectUnit(unitId) {
  const unit = UNITS.find(u => u.id === unitId);
  if (!unit || !unit.available) return;
  state.currentUnit = unit;
  state.currentIndex = 0;
  state.answered = false;
  state.selectedOpt = null;
  renderUnitNav();
  renderQuestion();
}

// ============================================================
//  Question Rendering
// ============================================================
function renderQuestion() {
  const card = document.getElementById('quiz-card');
  const unit = state.currentUnit;
  if (!unit) return;

  const questions = unit.questions;
  if (questions.length === 0) {
    card.innerHTML = `<div class="empty-state"><h2>此單元尚無題目資料</h2><p>請選擇其他單元</p></div>`;
    return;
  }

  if (state.currentIndex >= questions.length) {
    renderComplete();
    return;
  }

  const q = questions[state.currentIndex];
  const rec = getRecord(unit.id);
  const pct = Math.round(state.currentIndex / questions.length * 100);
  const alreadyDone = rec.answered.has(state.currentIndex);

  card.innerHTML = `
    <div class="q-meta">
      <span class="q-unit">${unit.name}</span>
      <span class="q-counter">${state.currentIndex + 1} / ${questions.length}</span>
    </div>
    <div class="q-progress"><div class="q-progress-fill" style="width:${pct}%"></div></div>
    <div class="q-text">${q.q}</div>
    <div class="options" id="options"></div>
    ${q.exp ? `<div class="explanation" id="explanation"><strong>解析：</strong>${q.exp}</div>` : ''}
    <div class="controls">
      <button class="btn btn-secondary" onclick="skipQuestion()">跳題 →</button>
      <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none">下一題</button>
    </div>
  `;

  // Render options
  const optsDiv = document.getElementById('options');
  const labels = ['A', 'B', 'C', 'D'];
  q.opts.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.setAttribute('data-idx', i);
    div.innerHTML = `<span class="opt-label">${labels[i]}</span><span class="opt-text">${opt}</span>`;
    div.onclick = () => selectOption(i);
    optsDiv.appendChild(div);
  });
}

function selectOption(idx) {
  if (state.answered) return;
  state.answered = true;
  state.selectedOpt = idx;

  const unit = state.currentUnit;
  const q = unit.questions[state.currentIndex];
  const correct = Array.isArray(q.ans) ? q.ans : [q.ans];
  const isCorrect = correct.includes(idx);

  // Update record
  const rec = getRecord(unit.id);
  if (!rec.answered.has(state.currentIndex)) {
    rec.answered.add(state.currentIndex);
    rec.total++;
    if (isCorrect) rec.correct++;
    saveRecords();
  }

  // Style options
  const opts = document.querySelectorAll('.option');
  opts.forEach(opt => {
    opt.classList.add('disabled');
    const i = parseInt(opt.getAttribute('data-idx'));
    if (i === idx) {
      opt.classList.add(isCorrect ? 'correct' : 'wrong');
    }
    if (correct.includes(i) && i !== idx) {
      opt.classList.add('correct-highlight');
    }
  });

  // Show explanation
  const expDiv = document.getElementById('explanation');
  if (expDiv) expDiv.classList.add('show');

  // Show next btn
  const nextBtn = document.getElementById('next-btn');
  if (nextBtn) nextBtn.style.display = 'inline-block';

  updateStats();
  renderUnitNav();
}

function skipQuestion() {
  state.currentIndex++;
  state.answered = false;
  state.selectedOpt = null;
  if (state.currentIndex >= state.currentUnit.questions.length) {
    renderComplete();
  } else {
    renderQuestion();
  }
}

function nextQuestion() {
  if (!state.answered) return;
  state.currentIndex++;
  state.answered = false;
  state.selectedOpt = null;
  if (state.currentIndex >= state.currentUnit.questions.length) {
    renderComplete();
  } else {
    renderQuestion();
  }
}

// ============================================================
//  Complete Screen
// ============================================================
function renderComplete() {
  const card = document.getElementById('quiz-card');
  const unit = state.currentUnit;
  const rec = getRecord(unit.id);
  const pct = rec.total > 0 ? Math.round(rec.correct / rec.total * 100) : 0;
  const scoreClass = pct >= 80 ? 'score-good' : pct >= 60 ? 'score-mid' : 'score-bad';
  const emoji = pct >= 80 ? '🎉' : pct >= 60 ? '💪' : '📖';

  card.innerHTML = `
    <div class="complete-state">
      <h2>${emoji} 單元完成！</h2>
      <div class="complete-score ${scoreClass}">${pct}%</div>
      <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:8px">答對 ${rec.correct} / 共 ${rec.total} 題</p>
      <p style="color:var(--text-dim);font-size:0.83rem">單元：${unit.name}</p>
      <button class="btn-restart" onclick="restartUnit()">重新練習</button>
    </div>
  `;
}

function restartUnit() {
  const unitId = state.currentUnit.id;
  // Reset this unit's record
  state.records[unitId] = { total: 0, correct: 0, answered: new Set() };
  saveRecords();
  state.currentIndex = 0;
  state.answered = false;
  state.selectedOpt = null;
  updateStats();
  renderUnitNav();
  renderQuestion();
}

// ============================================================
//  Init
// ============================================================
loadRecords();
renderUnitNav();
updateStats();
</script>
</body>
</html>
