<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英文學習測驗 App</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#222536;--border:#2e3248;
  --accent:#7c6ef8;--accent2:#f86e51;--accent3:#4ecdc4;
  --text:#e8eaf0;--text2:#9499b2;--text3:#5a5f7a;
  --success:#52c41a;--error:#ff4d4f;--radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;top:-50%;left:-20%;width:60%;height:120%;background:radial-gradient(ellipse,rgba(124,110,248,0.06) 0%,transparent 70%);pointer-events:none;z-index:0;}

/* NAV */
.nav{position:sticky;top:0;background:rgba(15,17,23,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;z-index:100;}
.nav-title{font-size:1.1rem;font-weight:700;color:var(--accent);letter-spacing:.05em;}
.nav-back{display:none;cursor:pointer;padding:6px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:.85rem;transition:all .2s;}
.nav-back:hover{border-color:var(--accent);color:var(--accent);}
.nav-back.show{display:block;}

/* PAGES */
.page{display:none;} .page.active{display:block;}

/* HOME */
.home-header{padding:48px 24px 24px;text-align:center;}
.home-header h1{font-size:2.2rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;}
.home-header p{color:var(--text2);font-size:.95rem;}
.stats-bar{display:flex;gap:12px;padding:0 24px 28px;justify-content:center;flex-wrap:wrap;}
.stat-chip{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:6px 16px;font-size:.8rem;color:var(--text2);display:flex;align-items:center;gap:8px;}
.stat-dot{width:8px;height:8px;border-radius:50%;}

/* UNIT GRID */
.units-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:0 24px 40px;position:relative;z-index:1;}
.unit-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;}
.unit-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent3));opacity:0;transition:opacity .2s;}
.unit-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,110,248,.15);}
.unit-card:hover::before{opacity:1;}
/* completed state */
.unit-card.done{border-color:rgba(82,196,26,.35);}
.unit-card.done::before{background:linear-gradient(90deg,var(--success),#7ed957);opacity:1;}

.unit-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.unit-number{font-family:'Space Mono',monospace;font-size:.75rem;color:var(--accent);background:rgba(124,110,248,.1);padding:3px 10px;border-radius:6px;}
/* checkmark badge */
.unit-check{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.unit-check.done{background:rgba(82,196,26,.15);color:var(--success);}
.unit-check.undone{background:var(--surface2);color:var(--text3);font-size:.65rem;font-family:'Space Mono',monospace;}

.unit-title{font-size:1rem;font-weight:600;margin-bottom:6px;}
.unit-subtitle{font-size:.8rem;color:var(--text2);margin-bottom:14px;}
.unit-tags{display:flex;gap:6px;flex-wrap:wrap;}
.unit-tag{font-size:.7rem;padding:2px 8px;border-radius:4px;font-family:'Space Mono',monospace;}
.tag-v{background:rgba(124,110,248,.15);color:var(--accent);}
.tag-p{background:rgba(248,110,81,.15);color:var(--accent2);}
.tag-s{background:rgba(78,205,196,.15);color:var(--accent3);}

.reset-zone{padding:0 24px 48px;text-align:center;}
.reset-btn{background:transparent;border:1px solid var(--border);color:var(--text3);font-size:.8rem;padding:8px 20px;border-radius:8px;cursor:pointer;transition:all .2s;font-family:'Space Mono',monospace;}
.reset-btn:hover{border-color:var(--error);color:var(--error);}

/* UNIT PAGE */
.unit-page-header{padding:28px 24px 20px;border-bottom:1px solid var(--border);}
.unit-page-title{font-size:1.4rem;font-weight:700;margin-bottom:6px;}
.unit-page-sub{color:var(--text2);font-size:.85rem;}
.unit-tabs{display:flex;padding:0 24px;border-bottom:1px solid var(--border);overflow-x:auto;gap:0;}
.unit-tab{padding:14px 18px;font-size:.85rem;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;}
.unit-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.unit-tab:hover:not(.active){color:var(--text);}
.tab-content{display:none;padding:24px;} .tab-content.active{display:block;}

/* STUDY CARDS */
.study-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:32px;}
.study-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
.study-card .word{font-size:1.1rem;font-weight:700;color:var(--accent);margin-bottom:4px;font-family:'Space Mono',monospace;}
.study-card .pos{font-size:.75rem;color:var(--text3);margin-bottom:6px;}
.study-card .meaning{font-size:.9rem;color:var(--text);margin-bottom:8px;}
.study-card .example{font-size:.78rem;color:var(--text2);border-left:2px solid var(--border);padding-left:10px;line-height:1.5;}
.sim-num{font-size:.7rem;color:var(--accent3);margin-bottom:6px;font-family:'Space Mono',monospace;letter-spacing:.05em;}
.sim-content{font-size:.85rem;line-height:1.9;}
.sim-content .ew{color:var(--accent);font-weight:600;}

/* QUIZ */
.quiz-wrap{max-width:680px;margin:0 auto;}
.quiz-progress{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.quiz-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.quiz-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:3px;transition:width .4s ease;}
.quiz-counter{font-family:'Space Mono',monospace;font-size:.8rem;color:var(--text2);white-space:nowrap;}
.quiz-score-live{font-family:'Space Mono',monospace;font-size:.8rem;color:var(--accent3);white-space:nowrap;}

.quiz-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;margin-bottom:20px;min-height:140px;}
.quiz-type-badge{display:inline-block;font-size:.68rem;font-family:'Space Mono',monospace;color:var(--accent2);background:rgba(248,110,81,.1);padding:2px 10px;border-radius:4px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}
.quiz-question{font-size:1.3rem;font-weight:600;line-height:1.5;margin-bottom:8px;}
.quiz-question .hl{color:var(--accent);font-family:'Space Mono',monospace;}
.quiz-hint{font-size:.78rem;color:var(--text3);margin-top:6px;font-style:italic;line-height:1.4;}

.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.quiz-opt{background:var(--surface2);border:2px solid var(--border);border-radius:10px;padding:14px 18px;cursor:pointer;transition:all .15s;font-size:.88rem;text-align:left;color:var(--text);line-height:1.4;font-family:'Noto Sans TC',sans-serif;}
.quiz-opt:hover:not([disabled]){border-color:var(--accent);background:rgba(124,110,248,.08);}
.quiz-opt.correct{border-color:var(--success)!important;background:rgba(82,196,26,.1)!important;color:var(--success);}
.quiz-opt.wrong{border-color:var(--error)!important;background:rgba(255,77,79,.08)!important;color:var(--error);}
.quiz-opt[disabled]{cursor:default;}

.quiz-feedback{display:none;padding:12px 16px;border-radius:10px;margin-bottom:16px;font-size:.88rem;line-height:1.5;}
.quiz-feedback.show{display:block;}
.quiz-feedback.ok{background:rgba(82,196,26,.08);border:1px solid rgba(82,196,26,.3);color:#a0d982;}
.quiz-feedback.bad{background:rgba(255,77,79,.08);border:1px solid rgba(255,77,79,.25);color:#ff8a8b;}

.quiz-next{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#5b4fd4);border:none;border-radius:10px;color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s;display:none;font-family:'Noto Sans TC',sans-serif;}
.quiz-next.show{display:block;}
.quiz-next:hover{opacity:.9;transform:translateY(-1px);}

/* RESULT */
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;text-align:center;max-width:480px;margin:40px auto;}
.result-score{font-size:4rem;font-weight:700;font-family:'Space Mono',monospace;background:linear-gradient(135deg,var(--accent3),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;}
.result-label{color:var(--text2);margin-bottom:24px;}
.result-breakdown{display:flex;gap:16px;justify-content:center;margin-bottom:24px;}
.result-stat{background:var(--surface2);border-radius:10px;padding:12px 20px;font-family:'Space Mono',monospace;}
.result-stat .num{font-size:1.5rem;font-weight:700;}
.result-stat .lbl{font-size:.7rem;color:var(--text2);margin-top:2px;}
.result-stat.ok .num{color:var(--success);}
.result-stat.bad .num{color:var(--error);}
.result-missed{text-align:left;margin-bottom:24px;max-height:200px;overflow-y:auto;}
.result-missed-title{font-size:.8rem;color:var(--text3);margin-bottom:10px;font-family:'Space Mono',monospace;}
.missed-item{background:var(--surface2);border-radius:8px;padding:10px 14px;margin-bottom:6px;font-size:.82rem;}
.missed-item .mq{color:var(--accent);margin-bottom:2px;}
.missed-item .ma{color:var(--text2);}
.result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.btn{padding:12px 24px;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;border:none;font-family:'Noto Sans TC',sans-serif;}
.btn-primary{background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;}
.btn-primary:hover{opacity:.9;}
.btn-secondary{background:var(--surface2);border:1px solid var(--border);color:var(--text);}
.btn-secondary:hover{border-color:var(--accent);}

::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

@media(max-width:600px){
  .home-header h1{font-size:1.6rem;}
  .units-grid{grid-template-columns:1fr;padding:0 16px 40px;}
  .quiz-options{grid-template-columns:1fr;}
  .tab-content{padding:16px;}
  .study-grid{grid-template-columns:1fr;}
  .quiz-card{padding:20px;}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.page.active{animation:fadeIn .3s ease;}
.unit-card{animation:fadeIn .3s ease backwards;}
/* checkmark pop */
@keyframes checkPop{0%{transform:scale(0);}70%{transform:scale(1.3);}100%{transform:scale(1);}}
.unit-check.done{animation:checkPop .35s ease;}
</style>
</head>
<body>

<nav class="nav">
  <button class="nav-back" id="navBack" onclick="goHome()">← 返回主頁</button>
  <span class="nav-title" id="navTitle">英文學習測驗</span>
</nav>

<!-- HOME -->
<div class="page active" id="homePage">
  <div class="home-header">
    <h1>英文學習測驗</h1>
    <p>字彙 · 片語 · 相似詞　全方位練習</p>
  </div>
  <div class="stats-bar">
    <div class="stat-chip"><div class="stat-dot" style="background:var(--accent)"></div>字彙 283</div>
    <div class="stat-chip"><div class="stat-dot" style="background:var(--accent2)"></div>片語 115</div>
    <div class="stat-chip"><div class="stat-dot" style="background:var(--accent3)"></div>相似詞 133</div>
  </div>
  <div class="units-grid" id="unitsGrid"></div>
  <div class="reset-zone">
    <button class="reset-btn" onclick="confirmReset()">🗑 清除所有學習紀錄</button>
  </div>
</div>

<!-- UNIT PAGE -->
<div class="page" id="unitPage">
  <div class="unit-page-header">
    <div class="unit-page-title" id="unitTitle"></div>
    <div class="unit-page-sub" id="unitSub"></div>
  </div>
  <div class="unit-tabs">
    <div class="unit-tab active" onclick="switchTab(0)">📖 字彙複習</div>
    <div class="unit-tab" onclick="switchTab(1)">📝 片語複習</div>
    <div class="unit-tab" onclick="switchTab(2)">🔍 相似詞複習</div>
    <div class="unit-tab" onclick="switchTab(3)">🎯 測驗（10題）</div>
  </div>
  <div class="tab-content active" id="tab0"></div>
  <div class="tab-content" id="tab1"></div>
  <div class="tab-content" id="tab2"></div>
  <div class="tab-content" id="tab3"><div class="quiz-wrap" id="quizWrap"></div></div>
</div>

// ── Storage ──
function getProgress() {
  try { return JSON.parse(localStorage.getItem('eng_v4') || '{}'); } catch(e) { return {}; }
}
function saveProgress(p) { localStorage.setItem('eng_v4', JSON.stringify(p)); }
function getUP(i) { return getProgress()[i] || {done: false, score:-1, total:0}; }
function setUP(i, d) { const p = getProgress(); p[i] = {...getUP(i), ...d}; saveProgress(p); }

function confirmReset() {

    localStorage.removeItem('eng_v4');
    renderHome();
  }
}

// ── Cycle-pick (distinct from quiz handler) ──
function cyclePick(arr, startIdx) {
  const n = arr.length;
  const out = [];
  for(let i = 0; i < IPU; i++) out.push(arr[(startIdx + i) % n]);
  return out;
}

function shuffle(a) {
  const b = [...a];
  for(let i = b.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

// ── Unit Data ──
function getUD(ui) {
  const vs = APP_DATA.vocabulary.slice(ui * IPU, ui * IPU + IPU);
  const ps = cyclePick(APP_DATA.phrases, ui * IPU);
  const ss = cyclePick(APP_DATA.similar_words, ui * IPU);
  return { vocab: vs, phrases: ps, similar: ss };
}

// ── Home ──
let CU = 0, CUD = null;

function renderHome() {
  const g = document.getElementById('unitsGrid');
  g.innerHTML = '';
  for(let i = 0; i < TOTAL_UNITS; i++) {
    const up = getUP(i);
    const d  = getUD(i);
    const isDone = up.done;
    const firstWord = d.vocab[0]?.word || '';

// ── Build Quiz (10 questions: 4 vocab + 3 phrase + 3 similar) ──
function buildQuestions() {
  const pool = [];

  // 4 Vocab: word → Chinese meaning
  CUD.vocab.filter(v => v.chinese).slice(0, 4).forEach(v => {
    const wrong = shuffle(
      APP_DATA.vocabulary.filter(x => x.word !== v.word && x.chinese)
    ).slice(0, 3).map(x => x.chinese.substring(0, 20));
    if(wrong.length < 3) return;
    const ans = v.chinese.substring(0, 20);
    pool.push({
      type: '字彙',
      q: v.word,
      hint: (v.pos_def || '').split('\n')[0].substring(0, 55),
      ans: ans,
      opts: shuffle([ans, ...wrong])
    });
  });

  // 3 Phrases: Chinese → English phrase
  CUD.phrases.filter(p => p.definition && p.phrase).slice(0, 3).forEach(p => {
    const wrong = shuffle(
      APP_DATA.phrases.filter(x => x.phrase !== p.phrase)
    ).slice(0, 3).map(x => x.phrase);
    if(wrong.length < 3) return;
    pool.push({
      type: '片語',
      q: '「' + p.definition + '」的英文片語是？',
      hint: (p.example_en || '').substring(0, 65),
      ans: p.phrase,
      opts: shuffle([p.phrase, ...wrong])
    });
  });

  // 3 Similar: Chinese meaning → correct English word
  let simCount = 0;
  for(const s of CUD.similar) {
    if(simCount >= 3) break;
    const wordMatches = s.content.match(/[a-zA-Z]{3,}/g) || [];
    const chMatches   = s.content.match(/[一-鿿]{2,10}/g) || [];
    if(!wordMatches.length || !chMatches.length) continue;
    const targetWord    = wordMatches[0];
    const targetMeaning = chMatches[0];
    const wrongWords = [];
    for(const x of APP_DATA.similar_words) {
      if(x.number === s.number) continue;
      const ws = (x.content.match(/[a-zA-Z]{3,}/g) || []);
      if(ws.length && ws[0] !== targetWord) wrongWords.push(ws[0]);
      if(wrongWords.length >= 15) break;
    }
    const wrong = shuffle(wrongWords).slice(0, 3);
    if(wrong.length < 3) continue;
    pool.push({
      type: '相似詞',
      q: '「' + targetMeaning + '」的英文是？',
      hint: s.content.substring(0, 75),
      ans: targetWord,
      opts: shuffle([targetWord, ...wrong])
    });
    simCount++;
  }

  return shuffle(pool).slice(0, 10);
}

// ── Quiz State ──
let QS = { questions:[], cur:0, correct:0, missed:[], answered:false };

function startQuiz() {
  QS = { questions: buildQuestions(), cur:0, correct:0, missed:[], answered:false };
  if(!QS.questions.length) {
    document.getElementById('quizWrap').innerHTML =
      '<div style="text-align:center;padding:60px;color:var(--text2)">題目載入失敗，請重新整理頁面。</div>';
    return;
  }
  renderQ();
}

function renderQ() {
  const wrap  = document.getElementById('quizWrap');
  const total = QS.questions.length;
  const cur   = QS.cur;

  if(cur >= total) {
    // Mark unit as done + save score
    setUP(CU, { done: true, score: QS.correct, total: total });
    const pct   = Math.round(QS.correct / total * 100);
    const emoji = pct >= 90 ? '🏆' : pct >= 70 ? '👏' : pct >= 50 ? '📚' : '💪';
    const missedHTML = QS.missed.length
      ? '<div class="result-missed">' +
          '<div class="result-missed-title">答錯的題目：</div>' +
          QS.missed.map(m =>
            '<div class="missed-item">' +
              '<div class="mq">' + m.q.substring(0,40) + '</div>' +
              '<div class="ma">正確答案：' + m.ans + '</div>' +
            '</div>'
          ).join('') +
        '</div>'
      : '';
    wrap.innerHTML =
      '<div class="result-card">' +
        '<div style="font-size:2.5rem;margin-bottom:12px">' + emoji + '</div>' +
        '<div class="result-score">' + QS.correct +
          '<span style="font-size:2rem;color:var(--text2)">/' + total + '</span></div>' +
        '<div class="result-label">' + pct + '% · ' + (pct>=80?'優秀！繼續保持':'繼續加油，多複習再測！') + '</div>' +
        '<div class="result-breakdown">' +
          '<div class="result-stat ok"><div class="num">' + QS.correct + '</div><div class="lbl">答對</div></div>' +
          '<div class="result-stat bad"><div class="num">' + QS.missed.length + '</div><div class="lbl">答錯</div></div>' +
        '</div>' +
        missedHTML +
        '<div class="result-actions">' +
          '<button class="btn btn-primary" onclick="startQuiz()">再測一次</button>' +
          '<button class="btn btn-secondary" onclick="switchTab(0)">回複習</button>' +
          '<button class="btn btn-secondary" onclick="goHome()">主頁</button>' +
        '</div>' +
      '</div>';
    return;
  }

  const q      = QS.questions[cur];
  const barPct = cur / total * 100;
  const isLast = (cur + 1 >= total);

  wrap.innerHTML =
    '<div class="quiz-progress">' +
      '<div class="quiz-bar"><div class="quiz-bar-fill" style="width:' + barPct + '%"></div></div>' +
      '<div class="quiz-counter">' + (cur+1) + ' / ' + total + '</div>' +
      '<div class="quiz-score-live">✓ ' + QS.correct + '</div>' +
    '</div>' +
    '<div class="quiz-card">' +
      '<div class="quiz-type-badge">' + q.type + '</div>' +
      '<div class="quiz-question"><span class="hl">' + q.q + '</span></div>' +
      (q.hint ? '<div class="quiz-hint">' + q.hint + '</div>' : '') +
    '</div>' +
    '<div class="quiz-options" id="opts">' +
      q.opts.map((o,i) =>
        '<button class="quiz-opt" onclick="selectOpt(' + i + ')" data-i="' + i + '">' + o + '</button>'
      ).join('') +
    '</div>' +
    '<div class="quiz-feedback" id="fb"></div>' +
    '<button class="quiz-next" id="nxt" onclick="nextQ()">' + (isLast ? '查看結果' : '下一題 →') + '</button>';
}

function selectOpt(idx) {
  if(QS.answered) return;
  QS.answered = true;
  const q    = QS.questions[QS.cur];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(o => o.setAttribute('disabled', true));
  const isOK = q.opts[idx] === q.ans;
  if(isOK) {
    QS.correct++;
    opts[idx].classList.add('correct');
    document.getElementById('fb').className = 'quiz-feedback show ok';
    document.getElementById('fb').innerHTML = '✓ 正確！';
  } else {
    QS.missed.push(q);
    opts[idx].classList.add('wrong');
    q.opts.forEach((o,i) => { if(o === q.ans) opts[i].classList.add('correct'); });
    document.getElementById('fb').className = 'quiz-feedback show bad';
    document.getElementById('fb').innerHTML = '✗ 正確答案：<strong>' + q.ans + '</strong>';
  }
  document.getElementById('nxt').classList.add('show');
}

function nextQ() {
  QS.cur++;
  QS.answered = false;
  renderQ();
}

// ── Init ──
renderHome();
</script>
</body>
</html>
